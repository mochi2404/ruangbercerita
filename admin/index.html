<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Ruang Cerita</title>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <div class="blob blob-one"></div>
      <div class="blob blob-two"></div>

      <nav class="nav">
        <a class="brand" href="/">
          <span class="brand-mark">💬</span>
          <h1 class="brand-title">Ruang Cerita</h1>
        </a>
        <div class="nav-actions">
          <a class="nav-pill" href="/">
            <i data-lucide="message-circle" style="width:16px;height:16px;"></i>
            User
          </a>
          <a class="nav-pill" href="/admin/">
            <i data-lucide="shield" style="width:16px;height:16px;"></i>
            Admin
          </a>
        </div>
      </nav>

      <main id="admin-layout" class="page admin-layout">
        <section id="admin-login-view" class="admin-login">
          <form id="admin-login-form" class="login-panel">
            <div class="login-icon">
              <i data-lucide="lock-keyhole" style="width:30px;height:30px;"></i>
            </div>
            <h2>Login Admin</h2>
            <p>Masukkan password untuk membuka dashboard chat.</p>
            <label class="login-field">
              <span>Password</span>
              <input id="admin-password" type="password" placeholder="Password admin" autocomplete="current-password">
            </label>
            <p id="admin-login-error" class="login-error hidden">Password salah.</p>
            <button class="login-button" type="submit">
              <i data-lucide="log-in" style="width:18px;height:18px;"></i>
              Masuk
            </button>
          </form>
        </section>

        <aside class="admin-sidebar">
          <div class="admin-sidebar-head">
            <div class="admin-sidebar-top">
              <div>
                <h2>
                  <i data-lucide="inbox" style="width:20px;height:20px;"></i>
                  Chat Masuk
                </h2>
                <p><span id="admin-chat-count">0</span> percakapan</p>
              </div>
              <button id="admin-logout" class="admin-logout" type="button" aria-label="Logout admin">
                <i data-lucide="log-out" style="width:18px;height:18px;"></i>
              </button>
            </div>
          </div>
          <div id="admin-chat-list" class="admin-list"></div>
        </aside>

        <section class="admin-main">
          <div id="admin-empty-view" class="admin-empty">
            <div>
              <div class="admin-empty-icon">📭</div>
              <p class="admin-empty-title">Belum ada chat masuk</p>
              <p class="admin-empty-subtitle">Chat akan muncul di sini ketika pengguna memulai</p>
            </div>
          </div>

          <div id="admin-chat-view" class="chat-page hidden">
            <div class="chat-header">
              <div class="chat-header-inner">
                <div class="chat-title-line">
                  <a class="ios-back-button" href="/admin/" aria-label="Kembali ke daftar chat admin">
                    <i data-lucide="chevron-left" style="width:22px;height:22px;"></i>
                    <span>Back</span>
                  </a>
                  <div>
                    <h3 id="admin-chat-header">Chat dengan Pengguna</h3>
                    <p id="admin-chat-subtitle">Mulai percakapan</p>
                  </div>
                </div>
                <a class="icon-button" href="/admin/" aria-label="Tutup">
                  <i data-lucide="x" style="width:20px;height:20px;"></i>
                </a>
              </div>
            </div>

            <div id="admin-messages" class="messages"></div>

            <form id="admin-form" class="chat-composer">
              <div class="composer-row">
                <textarea id="admin-input" rows="2" placeholder="Balas pesan..."></textarea>
                <button class="send-button" type="submit" aria-label="Kirim">
                  <i data-lucide="send" style="width:18px;height:18px;"></i>
                </button>
              </div>
            </form>
          </div>
        </section>
      </main>
    </div>

    <script src="/assets/app.js"></script>
    <script>
      window.RuangCerita.initAdmin();
    </script>
  </body>
</html>
